services:
  - type: web
    name: Discord-tts-bot
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@10 && pnpm install
    startCommand: pnpm --filter @workspace/api-server run bot
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: SESSION_SECRET
        sync: false
